<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Mini Claude Design</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Menlo', 'Consolas', 'Monaco', monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== 顶部栏 ===== */
    #top-bar {
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #0f1929;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      gap: 12px;
    }
    #top-bar-left { display: flex; align-items: center; gap: 10px; }
    #logo { font-size: 15px; font-weight: 700; color: #e0e0e0; letter-spacing: -0.3px; }
    #logo span { color: #8bb4f9; }
    .top-divider { width: 1px; height: 20px; background: #334466; }
    #model-select {
      background: #1a2744;
      border: 1px solid #334466;
      color: #e0e0e0;
      padding: 5px 10px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      min-width: 170px;
    }
    #model-select:focus { border-color: #8bb4f9; }
    #model-select option { background: #1a2744; }
    #top-bar-right { display: flex; align-items: center; gap: 10px; }
    #api-key-btn {
      background: transparent;
      border: 1px solid #334466;
      color: #aaa;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.15s;
    }
    #api-key-btn:hover { border-color: #8bb4f9; color: #8bb4f9; }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #f56c6c; flex-shrink: 0;
      transition: background 0.2s;
    }
    #status-dot.connected { background: #7ec699; }

    /* ===== 主区域（三栏） ===== */
    #main-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* 左侧：聊天面板 */
    #chat-panel {
      width: 360px; min-width: 280px;
      display: flex; flex-direction: column;
      border-right: 1px solid #2a2a4a; background: #16213e;
    }
    #chat-header {
      padding: 12px 16px; font-size: 13px; font-weight: 600;
      color: #8bb4f9; border-bottom: 1px solid #2a2a4a; background: #0f3460;
      display: flex; align-items: center; gap: 8px;
    }
    #chat-header::before { content: ''; width: 7px; height: 7px; background: #7ec699; border-radius: 50%; }
    #chat-log {
      flex: 1; overflow-y: auto; padding: 12px;
      font-size: 13px; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
    }
    .msg-user { color: #8bb4f9; margin-bottom: 6px; }
    .msg-user::before { content: '> '; color: #5a8bd4; }
    .msg-assistant { color: #d4a6e0; }
    .msg-tool-call { color: #7ec699; font-size: 12px; padding-left: 12px; }
    .msg-tool-result { color: #e6c07b; font-size: 12px; padding-left: 12px; }
    .msg-system { color: #666; font-style: italic; font-size: 12px; }
    .msg-done { color: #58a6ff; border-top: 1px solid #2a2a4a; margin-top: 8px; padding-top: 8px; font-size: 12px; }
    .msg-error { color: #f56c6c; }
    #chat-input-area {
      display: flex; border-top: 1px solid #2a2a4a;
      padding: 10px; background: #0f1929; gap: 6px;
    }
    #chat-input {
      flex: 1; background: #1a2744; border: 1px solid #334466;
      color: #e0e0e0; padding: 8px 12px; font-family: inherit;
      font-size: 13px; border-radius: 6px; outline: none; resize: none;
      min-height: 38px; max-height: 120px;
    }
    #chat-input:focus { border-color: #8bb4f9; }
    #send-btn {
      background: #8bb4f9; color: #1a1a2e; border: none;
      padding: 8px 18px; font-family: inherit; font-size: 13px;
      font-weight: bold; border-radius: 6px; cursor: pointer; white-space: nowrap;
    }
    #send-btn:hover { background: #a0c4ff; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 中间：文件目录 */
    #files-panel {
      width: 260px; min-width: 200px;
      display: flex; flex-direction: column;
      border-right: 1px solid #2a2a4a; background: #16213e;
    }
    #files-header {
      padding: 12px 16px; font-size: 13px; font-weight: 600;
      color: #e6c07b; border-bottom: 1px solid #2a2a4a; background: #0f3460;
      display: flex; align-items: center; gap: 8px;
    }
    #files-header::before { content: ''; width: 7px; height: 7px; background: #e6c07b; border-radius: 50%; }
    #files-list { flex: 1; overflow-y: auto; padding: 8px; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; cursor: pointer; border-radius: 6px;
      font-size: 13px; transition: background 0.15s; margin-bottom: 2px;
    }
    .file-item:hover { background: #1a3050; }
    .file-item.active { background: #0f3460; color: #8bb4f9; }
    .file-icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
    .file-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { color: #666; font-size: 11px; margin-left: auto; flex-shrink: 0; }
    #files-empty { color: #555; font-size: 13px; text-align: center; padding: 40px 16px; line-height: 1.6; }

    /* 右侧：预览 */
    #preview-panel {
      flex: 1; display: flex; flex-direction: column;
      background: #0d1117; min-width: 400px;
    }
    #preview-header {
      padding: 12px 16px; font-size: 13px; font-weight: 600;
      color: #7ec699; border-bottom: 1px solid #2a2a4a; background: #0f3460;
      display: flex; align-items: center; justify-content: space-between;
    }
    #preview-header-left { display: flex; align-items: center; gap: 8px; }
    #preview-header-left::before { content: ''; width: 7px; height: 7px; background: #7ec699; border-radius: 50%; }
    #preview-title { color: #aaa; font-size: 12px; font-weight: normal; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #preview-actions { display: flex; gap: 6px; }
    #preview-actions button {
      background: #1a2744; border: 1px solid #334466;
      color: #8bb4f9; padding: 4px 10px; border-radius: 4px;
      cursor: pointer; font-family: inherit; font-size: 11px;
    }
    #preview-actions button:hover { background: #243555; }
    #preview-frame-wrapper { flex: 1; position: relative; background: #fff; }
    #preview-frame { width: 100%; height: 100%; border: none; background: #fff; }
    #preview-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #444; font-size: 14px; gap: 12px; background: #fafafa;
    }
    #preview-placeholder .icon { font-size: 48px; opacity: 0.3; }

    /* API Key 弹窗 */
    #api-key-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 1000;
      justify-content: center; align-items: center;
    }
    #api-key-overlay.active { display: flex; }
    #api-key-dialog {
      background: #1a2744; border: 1px solid #334466;
      border-radius: 12px; padding: 28px; width: 480px;
      max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    #api-key-dialog h2 { font-size: 16px; margin-bottom: 10px; color: #e0e0e0; }
    #api-key-dialog p { font-size: 12px; color: #888; margin-bottom: 14px; line-height: 1.6; }
    #api-key-dialog a { color: #8bb4f9; }
    #api-key-input {
      width: 100%; background: #0f1929; border: 1px solid #334466;
      color: #e0e0e0; padding: 10px 12px; font-family: inherit;
      font-size: 13px; border-radius: 6px; outline: none;
    }
    #api-key-input:focus { border-color: #8bb4f9; }
    .dialog-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
    .dialog-buttons button { padding: 7px 18px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; font-size: 13px; }
    .btn-primary { background: #8bb4f9; color: #1a1a2e; font-weight: bold; }
    .btn-primary:hover { background: #a0c4ff; }
    .btn-secondary { background: #334466; color: #ccc; }
    .btn-secondary:hover { background: #445577; }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334455; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #445566; }

    /* 拖拽分隔条 */
    .resize-handle {
      width: 4px; cursor: col-resize; background: transparent;
      transition: background 0.15s; flex-shrink: 0;
    }
    .resize-handle:hover { background: #8bb4f9; }
  </style>
</head>
<body>

  <!-- 顶部栏 -->
  <div id="top-bar">
    <div id="top-bar-left">
      <span id="logo">Mini <span>Design</span></span>
      <div class="top-divider"></div>
      <select id="model-select" title="选择模型"></select>
    </div>
    <div id="top-bar-right">
      <button id="api-key-btn">API Key</button>
      <div id="status-dot"></div>
    </div>
  </div>

  <!-- 主区域 -->
  <div id="main-area">

    <!-- 左侧：聊天 -->
    <div id="chat-panel">
      <div id="chat-header">对话</div>
      <div id="chat-log"></div>
      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="描述你想要的设计，例如：帮我做一个登录页面..." rows="1"></textarea>
        <button id="send-btn">发送</button>
      </div>
    </div>
    <div class="resize-handle" data-target="chat-panel"></div>

    <!-- 中间：文件目录 -->
    <div id="files-panel">
      <div id="files-header">设计产物</div>
      <div id="files-list">
        <div id="files-empty">暂无文件<br/>LLM 生成的代码将显示在这里</div>
      </div>
    </div>
    <div class="resize-handle" data-target="files-panel"></div>

    <!-- 右侧：预览 -->
    <div id="preview-panel">
      <div id="preview-header">
        <span id="preview-header-left">预览</span>
        <span id="preview-title"></span>
        <div id="preview-actions">
          <button id="refresh-btn" title="刷新预览">刷新</button>
          <button id="new-tab-btn" title="新窗口打开">新窗口</button>
        </div>
      </div>
      <div id="preview-frame-wrapper">
        <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
        <div id="preview-placeholder">
          <div class="icon">&#x1F4F0;</div>
          <div>选择左侧文件或等待 LLM 生成代码</div>
        </div>
      </div>
    </div>

  </div>

  <!-- API Key 弹窗 -->
  <div id="api-key-overlay">
    <div id="api-key-dialog">
      <h2>设置智谱 AI API Key</h2>
      <p>请输入你的智谱 AI API Key。前往 <a href="https://open.bigmodel.cn" target="_blank">open.bigmodel.cn</a> 注册并获取。Key 将保存在浏览器本地存储中。</p>
      <input id="api-key-input" type="password" placeholder="请输入 API Key..." />
      <div class="dialog-buttons">
        <button class="btn-secondary" id="api-key-cancel">取消</button>
        <button class="btn-primary" id="api-key-confirm">确认</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { runAgent } from './agent.js';
    import { getApiKey, setApiKey, hasApiKey, getModel, setModel, MODEL_LIST } from './llm.js';
    import { getFileStore } from './tools/filesystem.js';

    // DOM
    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const filesList = document.getElementById('files-list');
    const previewFrame = document.getElementById('preview-frame');
    const previewPlaceholder = document.getElementById('preview-placeholder');
    const previewTitle = document.getElementById('preview-title');
    const refreshBtn = document.getElementById('refresh-btn');
    const newTabBtn = document.getElementById('new-tab-btn');
    const modelSelect = document.getElementById('model-select');
    const apikeyBtn = document.getElementById('api-key-btn');
    const statusDot = document.getElementById('status-dot');
    const overlay = document.getElementById('api-key-overlay');
    const apiKeyInput = document.getElementById('api-key-input');
    const confirmBtn = document.getElementById('api-key-confirm');
    const cancelBtn = document.getElementById('api-key-cancel');

    let running = false;
    let activeFile = null;
    let conversationMessages = [];

    // ===== 模型选择器初始化 =====
    MODEL_LIST.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id; opt.textContent = m.label;
      modelSelect.appendChild(opt);
    });
    modelSelect.value = getModel();
    modelSelect.addEventListener('change', () => {
      setModel(modelSelect.value);
    });

    // ===== 状态指示灯 =====
    function updateStatusDot() {
      statusDot.classList.toggle('connected', hasApiKey());
    }
    updateStatusDot();

    // ===== 聊天日志 =====
    function log(text, cls) {
      const s = document.createElement('span'); s.className = cls || '';
      s.textContent = text; chatLog.appendChild(s); chatLog.scrollTop = chatLog.scrollHeight;
    }
    function logLine(t, c) { log(t + '\n', c); }

    // ===== 文件列表 =====
    function renderFileList() {
      const store = getFileStore();
      const files = [...store.keys()];
      if (files.length === 0) {
        filesList.innerHTML = '<div id="files-empty">暂无文件<br/>LLM 生成的代码将显示在这里</div>';
        return;
      }
      const sorted = [...files].sort((a, b) => {
        const ah = a.endsWith('.html') || a.endsWith('.htm'), bh = b.endsWith('.html') || b.endsWith('.htm');
        if (ah && !bh) return -1; if (!ah && bh) return 1;
        return a.localeCompare(b);
      });
      filesList.innerHTML = sorted.map(p => {
        const ext = p.split('.').pop().toLowerCase();
        const icons = { html:'&#x1F310;',htm:'&#x1F310;',css:'&#x1F3A8;',js:'&#x1F4D3;',json:'&#x1F4C4;',md:'&#x1F4DD;',svg:'&#x1F3B5;' };
        const icon = icons[ext] || '&#x1F4C4;';
        const sizeKB = (new Blob([store.get(p)||'']).size / 1024).toFixed(1);
        return `<div class="file-item ${p===activeFile?'active':''}" data-path="${p}" title="${p}">
          <span class="file-icon">${icon}</span><span class="file-name">${p}</span><span class="file-size">${sizeKB}kb</span></div>`;
      }).join('');
      filesList.querySelectorAll('.file-item').forEach(el =>
        el.addEventListener('click', () => selectFile(el.dataset.path))
      );
    }

    function selectFile(path) {
      activeFile = path;
      const store = getFileStore(), content = store.get(path);
      if (!content) return;
      filesList.querySelectorAll('.file-item').forEach(e =>
        e.classList.toggle('active', e.dataset.path === path)
      );
      previewTitle.textContent = path;
      if (path.endsWith('.html') || path.endsWith('.htm')) {
        previewPlaceholder.style.display = 'none';
        previewFrame.style.display = 'block';
        previewFrame.srcdoc = content;
      } else {
        previewFrame.style.display = 'none';
        previewPlaceholder.style.display = 'flex';
        previewPlaceholder.innerHTML = `<div style="max-width:90%;max-height:80%;overflow:auto;background:#1a1a2e;color:#e0e0e0;padding:20px;border-radius:8px;font-size:12px;line-height:1.6;white-space:pre;word-break:break-all;text-align:left;">
          <div style="color:#8bb4f9;margin-bottom:8px;font-size:13px;">${path} (源码)</div>${content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').slice(0,50000)}</div>`;
      }
    }

    refreshBtn.addEventListener('click', () => { if (activeFile) selectFile(activeFile); });
    newTabBtn.addEventListener('click', () => {
      if (!activeFile) return;
      const c = getFileStore().get(activeFile); if (!c) return;
      window.open(URL.createObjectURL(new Blob([c], { type: 'text/html' })), '_blank');
    });

    // ===== API Key 弹窗 =====
    function showKey() { overlay.classList.add('active'); apiKeyInput.value = getApiKey(); apiKeyInput.focus(); }
    function hideKey() { overlay.classList.remove('active'); }
    confirmBtn.addEventListener('click', () => {
      const k = apiKeyInput.value.trim(); if (!k) return;
      setApiKey(k); hideKey(); updateStatusDot();
      logLine('API Key 已设置。\n', 'msg-system');
    });
    cancelBtn.addEventListener('click', hideKey);
    apiKeyInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmBtn.click();
      if (e.key === 'Escape') hideKey();
    });
    apikeyBtn.addEventListener('click', showKey);

    // 初始化
    if (!hasApiKey()) {
      logLine('请先设置智谱 AI API Key（点击右上角 API Key 按钮）。\n', 'msg-system');
    } else {
      logLine('就绪。描述你想要的设计，我会生成 HTML 并实时预览。\n', 'msg-system');
    }

    // ===== 发送消息 =====
    async function handleSend() {
      if (running) return;
      if (!hasApiKey()) { showKey(); return; }
      const input = chatInput.value.trim();
      if (!input) return;

      running = true; sendBtn.disabled = true; sendBtn.textContent = '思考中...';
      logLine(`\n${input}\n`, 'msg-user');
      chatInput.value = ''; chatInput.style.height = 'auto';

      try {
        const msgs = await runAgent(input, {
          onText(t) { logLine(t, 'msg-assistant'); },
          onToolCall(n, i) { logLine(`⚡ ${n}(${JSON.stringify(i).slice(0,120)}${JSON.stringify(i).length>120?'...':''})\n`, 'msg-tool-call'); },
          onToolResult(n, r) {
            const d = typeof r==='string' ? (r.length>300?r.slice(0,300)+'\n...(截断)':r) : JSON.stringify(r).slice(0,300);
            logLine(`✅ ${n} → ${d}\n`, 'msg-tool-result');
            renderFileList();
            if (n === 'write_file' && !activeFile) {
              const m = r.match(/Written (.+?) \(/);
              if (m) setTimeout(() => selectFile(m[1]), 100);
            }
          },
          onDone(u) {
            const t = (u.input_tokens||0)+(u.output_tokens||0);
            logLine(`📊 tokens: ${t}\n`, 'msg-done');
          },
          onSnip(b, a) { logLine(`✂️ 裁剪上下文: ${b}→${a}\n`, 'msg-system'); },
        }, conversationMessages);

        conversationMessages = msgs;
        logLine('\n--- 可以继续调整 ---\n', 'msg-system');
      } catch (err) {
        logLine(`Error: ${err.message}\n`, 'msg-error');
        if (err.message.includes('API Key')) showKey();
      }

      running = false; sendBtn.disabled = false; sendBtn.textContent = '发送';
      chatInput.focus();
    }

    sendBtn.addEventListener('click', handleSend);
    chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    });

    // 拖拽分隔条
    document.querySelectorAll('.resize-handle').forEach(h => {
      let sx, sw, tp, tid = h.dataset.target;
      h.addEventListener('mousedown', e => {
        e.preventDefault();
        const panel = document.getElementById(tid);
        if (!panel) return; sx = e.clientX; sw = panel.offsetWidth; tp = panel;
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', stopDrag);
      });
      function onDrag(e) { if (tp) tp.style.width = Math.max(200, sw + e.clientX - sx) + 'px'; }
      function stopDrag() { document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag); }
    });

    renderFileList();
  </script>
</body>
</html>
